specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Clocktower_Subscribe
    network: base
    source:
      address: "0xFaF5fc2f77b21BC188f492b827D366B03a07c61f"
      abi: Clocktower_Subscribe
      startBlock: 32427185
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CallerLog
        - Coordinates
        - DefaultAdminDelayChangeCanceled
        - DefaultAdminDelayChangeScheduled
        - DefaultAdminTransferCanceled
        - DefaultAdminTransferScheduled
        - DetailsLog
        - ProvDetailsLog
        - RoleAdminChanged
        - RoleGranted
        - RoleRevoked
        - SubLog
        - UList
      abis:
        - name: Clocktower_Subscribe
          file: ./abis/Clocktower_Subscribe.json
      eventHandlers:
        - event: CallerLog(indexed uint40,indexed uint40,indexed address,bool)
          handler: handleCallerLog
        - event: Coordinates(indexed bytes32,uint256,uint256,uint256,indexed uint40)
          handler: handleCoordinates
        - event: DefaultAdminDelayChangeCanceled()
          handler: handleDefaultAdminDelayChangeCanceled
        - event: DefaultAdminDelayChangeScheduled(uint48,uint48)
          handler: handleDefaultAdminDelayChangeScheduled
        - event: DefaultAdminTransferCanceled()
          handler: handleDefaultAdminTransferCanceled
        - event: DefaultAdminTransferScheduled(indexed address,uint48)
          handler: handleDefaultAdminTransferScheduled
        - event: DetailsLog(indexed bytes32,indexed address,indexed uint40,string,string)
          handler: handleDetailsLog
        - event: ProvDetailsLog(indexed address,indexed uint40,string,string,string,string,string,string)
          handler: handleProvDetailsLog
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: SubLog(indexed bytes32,indexed address,indexed address,uint40,uint256,address,uint8)
          handler: handleSubLog
        - event: UList(indexed uint40,indexed bytes32,indexed address)
          handler: handleUList
      file: ./src/clocktower-subscribe.ts
