type CallerLog @entity(immutable: true) {
  id: Bytes!
  timestamp: BigInt! # uint40
  checkedDay: BigInt! # uint40
  caller: Bytes! # address
  isFinished: Boolean! # bool
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Coordinates @entity(immutable: true) {
  id: Bytes!
  internal_id: Bytes! # bytes32
  subscriberIndex: BigInt! # uint256
  subscriptionIndex: BigInt! # uint256
  frequency: BigInt! # uint256
  nextUncheckedDay: BigInt! # uint40
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type DefaultAdminDelayChangeCanceled @entity(immutable: true) {
